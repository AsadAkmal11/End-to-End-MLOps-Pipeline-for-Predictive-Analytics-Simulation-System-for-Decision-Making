services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agri-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agri-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
